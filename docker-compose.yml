services:
  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: zenvix
      POSTGRES_PASSWORD: zenvix_dev_password
      POSTGRES_DB: zenvix_dev
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      - DATABASE_URL=postgresql://zenvix:zenvix_dev_password@db:5432/zenvix_dev
      # For production build, we can override PORT if needed
      - PORT=3001
      - NODE_ENV=production
    depends_on:
      - db

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
