version: "3.9"

# ==============================================================================
# TARA HR System — Docker Compose (Production)
#
# Single command to launch everything:
#   docker compose up --build
#
# What happens:
# 1. PostgreSQL (with PostGIS) starts and becomes healthy
# 2. Redis starts and becomes healthy
# 3. Backend waits for both, then:
#    a. Runs Prisma migrations (creates/updates all tables)
#    b. Seeds default config (agents, roles, Hermes settings)
#    c. Starts the NestJS API on port 3001
# 4. Frontend builds and nginx serves on port 80
#
# After startup (production VPS):
# - Public:  http://<ip>/           (frontend + /api/ proxy)
# - Internal: backend:3001, db:5432, redis:6379 (Docker network only)
# - DB admin: SSH tunnel → 127.0.0.1:5432 on the VPS (do not expose DB publicly)
# ==============================================================================

services:
  # ============================================================================
  # PostgreSQL 16 + PostGIS 3.4
  # ============================================================================
  db:
    image: postgis/postgis:16-3.4-alpine
    container_name: tara-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: tara
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${DB_PASSWORD:-tara_secret_2024}
      # Ensure PostGIS extension is created automatically
      POSTGRES_INITDB_ARGS: "--locale=C.UTF-8"
    ports:
      - "127.0.0.1:${DB_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d tara"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  # ============================================================================
  # Redis 7 (sessions, caching, pub/sub)
  # ============================================================================
  redis:
    image: redis:7-alpine
    container_name: tara-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ============================================================================
  # Backend API (NestJS)
  # - Auto-runs migrations on startup
  # - Seeds default config (agents, roles, Hermes)
  # - Internal only on 3001; public access via nginx :80 → /api/
  # ============================================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tara-backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://postgres:${DB_PASSWORD:-tara_secret_2024}@db:5432/tara?schema=public
      JWT_SECRET: ${JWT_SECRET:-tara-jwt-secret-change-in-production}
      BCRYPT_ROUNDS: 12
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost,http://localhost:5173,https://tara.ralali.io,http://tara.ralali.io}
      REDIS_URL: redis://redis:6379
      # Hermes defaults (override via admin API after first boot)
      HERMES_ENABLED: ${HERMES_ENABLED:-false}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      # WhatsApp (Kapso)
      KAPSO_API_KEY: ${KAPSO_API_KEY:-}
      KAPSO_PHONE_NUMBER_ID: ${KAPSO_PHONE_NUMBER_ID:-1177690982091942}
      KAPSO_BUSINESS_ACCOUNT_ID: ${KAPSO_BUSINESS_ACCOUNT_ID:-1531978955225901}
      KAPSO_CONFIG_ID: ${KAPSO_CONFIG_ID:-014dc306-766f-43a3-b088-5efc73518b58}
      KAPSO_BUSINESS_NUMBER: ${KAPSO_BUSINESS_NUMBER:-+6285196416317}
      KAPSO_WEBHOOK_SECRET: ${KAPSO_WEBHOOK_SECRET:-}
      # TARA AI Assistant
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      DEMO_MODE: ${DEMO_MODE:-false}
      SEED_ON_START: ${SEED_ON_START:-false}
      SOP_UPLOAD_DIR: /var/data/tara/sop
      ATTENDANCE_PHOTO_DIR: /var/data/tara/attendance
      BRANDING_UPLOAD_DIR: /var/data/tara/branding
      MEM0_DATA_DIR: /var/data/tara/mem0
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=6144}
    expose:
      - "3001"
    volumes:
      - sop_data:/var/data/tara/sop
      - attendance_data:/var/data/tara/attendance
      - branding_data:/var/data/tara/branding
      - mem0_data:/var/data/tara/mem0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s

  # ============================================================================
  # Frontend (Vite build → nginx)
  # - Serves SPA on port 80
  # - Proxies /api/ to backend:3001
  # - Proxies /socket.io/ for WebSocket
  # ============================================================================
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tara.ralali.io}
    container_name: tara-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/tara.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

volumes:
  pgdata:
    driver: local
  redisdata:
    driver: local
  sop_data:
    driver: local
  attendance_data:
    driver: local
  branding_data:
    driver: local
  mem0_data:
    driver: local
