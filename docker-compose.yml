

services:
  db:
    container_name: bfs-db
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-zenvix}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-zenvix_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-zenvix_dev}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-zenvix} -d ${POSTGRES_DB:-zenvix_dev}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - zenvix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  db_backup:
    container_name: bfs-db-backup
    image: postgres:16-alpine
    restart: always
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backups:/backups
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-zenvix_dev_password}
      POSTGRES_USER: ${POSTGRES_USER:-zenvix}
      POSTGRES_DB: ${POSTGRES_DB:-zenvix_dev}
    entrypoint: >
      sh -c "while true; do
        echo \"[$(date)] Starting daily backup...\"
        pg_dump -h db -U $POSTGRES_USER $POSTGRES_DB > /backups/backup_$(date +%F_%H%M%S).sql;
        echo \"[$(date)] Backup completed successfully.\"
        sleep 86400;
      done"
    networks:
      - zenvix_net

  backend:
    container_name: bfs-backend
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER:-zenvix}:${POSTGRES_PASSWORD:-zenvix_dev_password}@db:5432/${POSTGRES_DB:-zenvix_dev}?schema=public
      - RUNTIME=docker
      - PERSISTENCE_MODE=db
      - JWT_SECRET=${JWT_SECRET}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
    volumes:
      - ./backups:/data/backups
      - ./logs:/data/logs
      - ./uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zenvix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    container_name: bfs-frontend
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    ports:
      - "3010:80"
    environment:
      - BACKEND_URL=http://bfs-backend:3001
      - PORT=80
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:80/ || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - zenvix_net
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  zenvix_net:
    driver: bridge

volumes:
  postgres_data:
