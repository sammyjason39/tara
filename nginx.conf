server {
    listen ${PORT};
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Support SPA routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy API requests to backend
    location /api/ {
        # Use Docker DNS resolver (standard for Docker bridge networks)
        resolver 127.0.0.11 valid=30s;
        
        # Strip the /api prefix before sending to backend
        # e.g., /api/v1/auth/register -> /v1/auth/register
        rewrite ^/api/(.*) /$1 break;
        
        set $backend_upstream "${BACKEND_URL}";
        
        proxy_pass $backend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        
        # Preservation of original headers for multi-tenancy
        proxy_set_header x-tenant-id $http_x_tenant_id;
        proxy_set_header x-location-id $http_x_location_id;
        proxy_set_header x-ecommerce-id $http_x_ecommerce_id;
    }

    # Static assets caching
    location /assets {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }

    # Error pages
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
