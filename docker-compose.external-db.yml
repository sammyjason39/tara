# ==============================================================================
# TARA — Docker Compose with EXTERNAL PostgreSQL (Coolify / managed DB)
#
# Use when PostgreSQL runs as a separate Coolify service (or RDS, etc.).
# App containers can be redeployed without touching the database volume.
#
# Setup:
#   1. Create PostgreSQL 16 service in Coolify (persistent volume enabled)
#   2. Copy internal connection string → DATABASE_URL in app env
#   3. Deploy: docker compose -f docker-compose.external-db.yml up --build -d
#   4. First install only: SEED_ON_START=true (then set back to false)
# ==============================================================================

services:
  redis:
    image: redis:7-alpine
    container_name: tara-redis
    restart: unless-stopped
    ports:
      - "127.0.0.1:${REDIS_PORT:-6379}:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tara-backend
    restart: unless-stopped
    depends_on:
      redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: ${DATABASE_URL:?Set DATABASE_URL to external PostgreSQL}
      JWT_SECRET: ${JWT_SECRET:?Set JWT_SECRET}
      BCRYPT_ROUNDS: 12
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://tara.ralali.io}
      REDIS_URL: redis://redis:6379
      SEED_ON_START: ${SEED_ON_START:-false}
      HERMES_ENABLED: ${HERMES_ENABLED:-false}
      HERMES_API_KEY: ${HERMES_API_KEY:-}
      KAPSO_API_KEY: ${KAPSO_API_KEY:-}
      KAPSO_PHONE_NUMBER_ID: ${KAPSO_PHONE_NUMBER_ID:-}
      KAPSO_BUSINESS_ACCOUNT_ID: ${KAPSO_BUSINESS_ACCOUNT_ID:-}
      KAPSO_CONFIG_ID: ${KAPSO_CONFIG_ID:-}
      KAPSO_BUSINESS_NUMBER: ${KAPSO_BUSINESS_NUMBER:-}
      KAPSO_WEBHOOK_SECRET: ${KAPSO_WEBHOOK_SECRET:-}
      AI_API_KEY: ${AI_API_KEY:-}
      AI_BASE_URL: ${AI_BASE_URL:-https://openrouter.ai/api/v1}
      AI_MODEL: ${AI_MODEL:-deepseek-v4-flash}
      DEMO_MODE: ${DEMO_MODE:-false}
      SOP_UPLOAD_DIR: /var/data/tara/sop
      ATTENDANCE_PHOTO_DIR: /var/data/tara/attendance
      BRANDING_UPLOAD_DIR: /var/data/tara/branding
      MEM0_DATA_DIR: /var/data/tara/mem0
      NODE_OPTIONS: ${NODE_OPTIONS:---max-old-space-size=6144}
    expose:
      - "3001"
    volumes:
      - sop_data:/var/data/tara/sop
      - attendance_data:/var/data/tara/attendance
      - branding_data:/var/data/tara/branding
      - mem0_data:/var/data/tara/mem0
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:3001/health',(r)=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))\""]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-https://tara.ralali.io}
    container_name: tara-frontend
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${FRONTEND_PORT:-80}:80"
      - "${FRONTEND_SSL_PORT:-443}:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/tara.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro

volumes:
  redisdata:
    driver: local
  sop_data:
    driver: local
  attendance_data:
    driver: local
  branding_data:
    driver: local
  mem0_data:
    driver: local
