# Edge vhost for staging.tara.ralali.io (mounted into prod tara-frontend container)
# Proxies to tara-staging-frontend on shared Docker network.

server {
    listen 80;
    server_name staging.tara.ralali.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name staging.tara.ralali.io;

    client_max_body_size 100M;

    ssl_certificate /etc/letsencrypt/live/staging.tara.ralali.io/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/staging.tara.ralali.io/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Environment "staging" always;

    location / {
        proxy_pass http://tara-staging-frontend:80;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $http_connection;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
        client_max_body_size 100M;
    }
}
