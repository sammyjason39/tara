# Temporary HTTP-only vhost for Let's Encrypt certificate issuance (staging)
server {
    listen 80;
    server_name staging.tara.ralali.io;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 200 'TARA staging — obtaining SSL certificate';
        add_header Content-Type text/plain;
    }
}
