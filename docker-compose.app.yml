version: "3.9"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: zenvix_backend
    restart: always
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?schema=public
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - FRONTEND_URL=${FRONTEND_URL}
      - PORT=3001
      - RUNTIME=docker
    ports:
      - "3001:3001"
    depends_on:
      - db
    networks:
      - zenvix_net

  frontend:
    build:
      context: .
      dockerfile: Dockerfile # Assuming root Dockerfile is for frontend
    container_name: zenvix_frontend
    restart: always
    environment:
      - VITE_API_URL=${VITE_API_URL}
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - zenvix_net

networks:
  zenvix_net:
    external: true
